name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - name: Run tests (default + auto-discovered)
        run: bun test
      - name: Run @roostjs/ai React client tests (happy-dom preloaded)
        run: bun run --filter @roostjs/ai test:client
      - name: Run @roostjs/ai integration tests (miniflare)
        run: bun run --filter @roostjs/ai test:integration
      - name: Validate publish artifacts
        run: bun run release:preview
      - name: Require a changeset on release-bearing PRs
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: bun run changeset:check
