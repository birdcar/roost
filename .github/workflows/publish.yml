name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Run @roostjs/ai React client tests (happy-dom preloaded)
        run: bun run --filter @roostjs/ai test:client
      - name: Run @roostjs/ai integration tests (miniflare)
        run: bun run --filter @roostjs/ai test:integration
      - name: Publish packages
        run: |
          DRY_RUN="${{ inputs.dry-run }}"
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              name=$(node -e "console.log(require('./${pkg}package.json').name)")
              echo "Publishing $name..."
              cd "$pkg"
              if [ "$DRY_RUN" = "true" ]; then
                npm publish --access public --dry-run || true
              else
                npm publish --access public || echo "  ⚠ Failed to publish $name"
              fi
              cd ../..
            fi
          done
