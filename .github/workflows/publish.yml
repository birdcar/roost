name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Run @roostjs/ai React client tests (happy-dom preloaded)
        run: bun run --filter @roostjs/ai test:client
      - name: Run @roostjs/ai integration tests (miniflare)
        run: bun run --filter @roostjs/ai test:integration
      - name: Validate publish artifacts
        run: bun run release:preview
      - name: Create release PR or update versions
        if: github.event_name == 'push'
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version:packages
          commit: Version Packages
          title: Version Packages
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish packages
        if: github.event_name == 'push' && steps.changesets.outputs.hasChangesets == 'false'
        run: bun run release:publish
